# ddos_sdn — runtime configuration
#
# This file holds every tunable threshold for the detector and controller.
# Override location is resolved in this order:
#   1. explicit path argument to load_config(...)
#   2. $DDOS_SDN_CONFIG_FILE environment variable
#   3. config.yaml at the repository root (this file)
#   4. built-in defaults compiled into src/ddos_sdn/config.py
# The built-in defaults keep tests trivial; the YAML keeps production tunable.

# ------------------------------------------------------------------
# Detector tuning
# ------------------------------------------------------------------
detector:
  # Number of packets per closed entropy window.
  # Matches the companion report (§5.2) and report figure 6.1.x captions.
  window_packets: 250

  # Attack threshold expressed in bits (log base 2).
  # The original report used log10 with threshold 0.5 — converted to log2 that's ~1.66.
  # For a uniform window of 250 distinct destinations entropy is log2(250) ≈ 7.97;
  # for a single-target flood entropy is exactly 0.0.
  entropy_threshold_bits: 1.66

  # Per-(switch, port) packet count above which the controller treats the port
  # as part of an active flood and applies mitigation.
  port_count_threshold: 50

  # How often the controller wakes up to evaluate `port_stats` and install
  # mitigation rules. Seconds.
  timer_interval_seconds: 2

  # Phase 3 §3.B — unsupervised PCA-based anomaly detector.
  pca:
    # Trained model artifact produced by notebooks/train_pca_and_rf.ipynb.
    # Relative to the repo root; resolved at PCADetector.__init__ time.
    model_path: "models/pca.joblib"
    # Mahalanobis-distance percentile (over the full 80% benign training portion)
    # baked into the .joblib payload at training time. The value below is a
    # documentation echo of what the trained artifact already enforces; runtime
    # reads the threshold from the artifact, not from this config. Listed here
    # so a reviewer can grep the calibration choice without opening the notebook.
    benign_distance_percentile: 99

  # Phase 3 §3.C — supervised RandomForest classifier.
  rf:
    model_path: "models/rf.joblib"
    # P(attack) >= proba_threshold means verdict_rf == "ATTACK". Sklearn's
    # native default is 0.5; tunable per deployment via this key.
    proba_threshold: 0.5

# ------------------------------------------------------------------
# Controller behavior
# ------------------------------------------------------------------
controller:
  # How long an ARP cache entry is considered valid. Seconds.
  arp_entry_timeout_seconds: 120

  # Phase 3 §3.A — wall-clock lifetime of the installed ofp_flow_mod drop rule.
  # After this many seconds the rule expires and the controller resumes
  # processing PACKET_INs for the source it had been dropping. The retained
  # nw_src in port_stats means a returning attacker re-trips the threshold
  # one window later, not port_count_threshold packets later.
  flow_mod_hard_timeout_seconds: 30

# ------------------------------------------------------------------
# Telemetry (the JSON-line contract that demo.py / dashboard.py / CI consume)
# ------------------------------------------------------------------
telemetry:
  format: jsonl
  # Default sink "-" means sys.stdout. Set to an absolute path to write to disk
  # (e.g. /var/log/ddos_sdn/telemetry.jsonl). Tests inject an in-memory sink.
  path: "-"
  # The 13 fields in the contract. Order is significant: matches
  # TelemetryEmitter.FIELDS and the table in PROJECT_IMPROVEMENT_PROMPT.md §5.2.
  # As of Phase 3: 8 fields are populated by EntropyAnalyzer in the runtime
  # detector; the 4 PCA/RF fields are populated by PCADetector / MLDetector
  # when those detectors run in front of the analyzer (e.g. demo.py wires
  # all three). entropy_size remains null until Phase 4's packet-size work.
  fields:
    - t                 # real (Phase 1)
    - window_packets    # real (Phase 1)
    - entropy_dst       # real (Phase 1)
    - entropy_src       # real (Phase 3 §3.D.1) — Shannon entropy of src IPs
    - entropy_size      # null until Phase 4 §3.10 (packet-size tracking)
    - pps               # real (Phase 1)
    - pca_mahalanobis   # populated by PCADetector when run (Phase 3 §3.B)
    - rf_proba          # populated by MLDetector when run (Phase 3 §3.C)
    - verdict_entropy   # real (Phase 1)
    - verdict_pca       # populated by PCADetector when run (Phase 3 §3.B)
    - verdict_rf        # populated by MLDetector when run (Phase 3 §3.C)
    - top_dst           # real (Phase 1)
    - top_src           # real (Phase 1) — read by the Phase 3 ofp_flow_mod drop rule

# ------------------------------------------------------------------
# Phase 4b §4.11 — Multi-controller East-West coordination.
#
# Default disabled. Existing single-controller deployments (demo.py,
# docker compose up without a profile) keep the Phase 3 standalone code
# path verbatim; the section below is only consulted when enabled=true.
#
# When enabled, the worker controller embeds a WorkerClient that opens
# a long-lived TCP connection to the coordinator. Closed-window telemetry
# records are tee'd to BOTH stdout (preserves existing behavior) AND the
# coordinator (best-effort, drop-on-disconnect, fail-open). When the
# coordinator decides that two or more workers report the same top_src
# within tolerance_window_seconds, it issues a DROP_RULE_COMMAND that
# the receiving worker installs as an ofp_flow_mod via the Phase 3
# code path. See §4b.A/B/C/D and tests/test_coordinator_correlation.py.
# ------------------------------------------------------------------
coordinator:
  enabled: false
  host: "127.0.0.1"
  port: 9876
  # Worker → coordinator reconnect cadence. The worker degrades to
  # standalone Phase 3 mode whenever the socket is down; reconnect
  # is attempted every reconnect_interval_seconds.
  reconnect_interval_seconds: 5

  # Correlation policy (coordinator-side).
  # tolerance_window_seconds is the per-window correlation bucket size:
  # two WORKER_TELEMETRY messages with the same top_src and
  # verdict_entropy=ATTACK corroborate iff they land in the same
  # floor(receive_time / tolerance) bucket OR the immediately previous
  # bucket (the current+previous lookup pattern, per §4b.B). The
  # boundary-crossing test
  # tests/test_coordinator_correlation.py::test_correlation_across_bucket_boundary
  # locks the regression guard for that pattern.
  tolerance_window_seconds: 1.0
  min_corroborating_workers: 2

  # The worker_id this process self-identifies as on its first
  # WORKER_TELEMETRY. Must match an entry in `workers:` below. Override
  # this in per-worker config files (see docker/compose §4b.G).
  this_worker_id: "worker-1"

  # Static topology partitioning. EACH dpid must appear in EXACTLY ONE
  # worker's partition_dpids list — the coordinator validates at startup
  # and exits with a clear error if any dpid overlaps. See §4b.B for the
  # validation logic and
  # tests/test_coordinator_correlation.py::test_overlapping_partition_dpids_raises
  # for the regression guard.
  workers:
    - worker_id: "worker-1"
      partition_dpids: [1, 2]
    - worker_id: "worker-2"
      partition_dpids: [3, 4]
